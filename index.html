<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ambulance Call Volume Predictor</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #050c14;
            --surface: #0b1624;
            --card: #0f1e30;
            --border: #1a3a5c;
            --accent: #00c2ff;
            --accent2: #ff4d6d;
            --accent3: #00ffc8;
            --text: #c8e0f4;
            --muted: #4a6a8a;
            --glow: 0 0 18px rgba(0, 194, 255, 0.35);
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
        }

        /* animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 194, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 194, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridScroll 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(0, 194, 255, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 77, 109, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridScroll {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 40px 40px;
            }
        }

        .page {
            position: relative;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            line-height: 1;
        }


        .header h1 {
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px rgba(0, 194, 255, 0.5);
            line-height: 1.25;
            max-width: 950px;
        }

        .header h1 span {
            color: var(--accent);
        }

        /* ── CARD ── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 28px;
            width: 100%;
            max-width: 780px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent3), transparent);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            align-items: end;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field.full {
            grid-column: 1 / -1;
        }

        label {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 500;
        }

        select,
        input[type="date"],
        input[type="number"] {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            padding: 10px 14px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: none;
            -webkit-appearance: none;
        }

        select:focus,
        input:focus {
            border-color: var(--accent);
            box-shadow: var(--glow);
        }

        select option {
            background: var(--surface);
        }

        /* custom select arrow */
        .select-wrap {
            position: relative;
        }

        .select-wrap::after {
            content: '▾';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            pointer-events: none;
            font-size: 14px;
        }

        /* hour picker row */
        .hour-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hour-row input[type="number"] {
            width: 80px;
            text-align: center;
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            padding: 8px 10px;
        }

        /* remove spinners */
        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        .hour-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--accent);
            font-size: 18px;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, border-color 0.15s;
            user-select: none;
            flex-shrink: 0;
        }

        .hour-btn:hover {
            background: var(--border);
            border-color: var(--accent);
        }

        .hour-btn:active {
            transform: scale(0.93);
        }

        .hour-label {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 1px;
        }

        /* submit */
        .btn-predict {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #0076a8, #00c2ff);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 2px;
            padding: 13px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
            text-transform: uppercase;
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 194, 255, 0.4);
        }

        .btn-predict:active {
            transform: scale(0.98);
        }

        .btn-predict:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ── RESULT ── */
        .result-card {
            width: 100%;
            max-width: 780px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s, transform 0.4s;
            min-height: 80px;
        }

        .result-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .result-icon {
            font-size: 30px;
            flex-shrink: 0;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.12);
            }
        }

        .result-body {
            flex: 1;
        }

        .result-label {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 2px;
        }

        .result-station {
            font-size: 12px;
            color: var(--text);
            margin-bottom: 4px;
        }

        .result-value {
            font-family: 'Orbitron', monospace;
            font-size: clamp(22px, 4vw, 36px);
            font-weight: 900;
            color: var(--accent3);
            text-shadow: 0 0 20px rgba(0, 255, 200, 0.5);
            line-height: 1;
        }

        .result-unit {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
            letter-spacing: 1px;
        }

        .error-msg {
            color: var(--accent2);
            font-size: 12px;
            padding: 10px 16px;
            background: rgba(255, 77, 109, 0.08);
            border: 1px solid rgba(255, 77, 109, 0.25);
            border-radius: 8px;
            width: 100%;
            max-width: 680px;
            display: none;
        }

        /* spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-predict.loading .spinner {
            display: block;
        }

        .btn-predict.loading .btn-text {
            display: none;
        }

        .btn-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* data badge */
        .data-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(213, 230, 235, 0.06);
            border: 1px solid rgba(0, 194, 255, 0.15);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--muted);
            width: fit-content;
        }

        .data-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent3);
            animation: blink 1.5s ease-in-out infinite;
        }

        /* Recommendation panel */
        .recommendation-box {
            width: 460px;
            background: rgba(0, 194, 255, 0.06);
            border: 1px solid rgba(0, 194, 255, 0.18);
            border-radius: 10px;
            padding: 12px 14px;
            flex-shrink: 0;
        }

        .rec-title {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--accent3);
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .recommendation-box p {
            font-size: 11px;
            line-height: 1.6;
            color: var(--text);
            margin: 0;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }
        }
    </style>
</head>

<body>
    <div class="page">

        <!-- Header -->
        <div class="header">
            <br>
            <h1>Predicting Hourly <span>Ambulance</span> Call Volumes<br>Using Spatio-Temporal Machine Learning</h1>
            <br>
        </div>

        <!-- Data source badge -->
        <div class="data-badge">
            <div></div>

            Dublin City Council Open Data · 2013–2022
        </div>

        <!-- Form card -->
        <br>
        <div class="card">
            <div class="form-grid">

                <!-- Station -->
                <div class="field full">
                    <label>Fire Station</label>
                    <div class="select-wrap">
                        <select id="station">
                            {% for id, name in stations.items() %}
                            <option value="{{ name }}">{{ name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- Date -->
                <div class="field">
                    <label>Date</label>
                    <input type="date" id="date" />
                </div>

                <!-- Hour -->
                <div class="field">
                    <label>Hour of Day (00 – 23)</label>
                    <div class="hour-row">
                        <button class="hour-btn" onclick="changeHour(-1)">−</button>
                        <input type="number" id="hour" value="12" min="0" max="23" readonly onfocus="this.blur()" />
                        <button class="hour-btn" onclick="changeHour(1)">+</button>
                        <span class="hour-label" id="hourLabel">12:00</span>
                    </div>
                </div>

                <!-- Submit -->
                <button class="btn-predict" id="predictBtn" onclick="runPrediction()">
                    <div class="btn-inner">
                        <div class="spinner"></div>
                        <span class="btn-text">⚡ Predict Call Volume</span>
                    </div>
                </button>

            </div>
        </div>

        <!-- Error -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- Result -->
        <br>
        <div class="result-card" id="resultCard">
            <div class="result-icon">🚑</div>
            <div class="result-body">
                <div class="result-label">Predicted Ambulance Calls</div>
                <div class="result-station" id="resultStation"></div>
                <div class="result-value" id="resultValue">—</div>
                <div class="result-unit" id="resultUnit"></div>
            </div>
            <!-- Recommendation -->
            <div class="recommendation-box">
                <div class="rec-title">RESOURCE SUGGESTION</div>
                <p id="recommendationText">
                    Based on the predicted demand, ambulance redistribution advice will appear here.
                </p>
            </div>
        </div>

    </div>

    <script>
        // Set today as default date
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        document.getElementById('date').value = `${yyyy}-${mm}-${dd}`;
        updateHourLabel();

        function changeHour(delta) {
            const inp = document.getElementById('hour');
            let val = parseInt(inp.value) + delta;
            if (val < 0) val = 23;
            if (val > 23) val = 0;
            inp.value = val;
            updateHourLabel();
        }

        function updateHourLabel() {
            const h = parseInt(document.getElementById('hour').value);
            const period = h < 12 ? 'AM' : 'PM';
            const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
            document.getElementById('hourLabel').textContent =
                `${String(h).padStart(2, '0')}:00  (${h12} ${period})`;
        }

        async function runPrediction() {
            const btn = document.getElementById('predictBtn');
            const errEl = document.getElementById('errorMsg');
            const resultCard = document.getElementById('resultCard');

            errEl.style.display = 'none';
            resultCard.classList.remove('visible');

            const station = document.getElementById('station').value;
            const dateVal = document.getElementById('date').value;
            const hour = parseInt(document.getElementById('hour').value);

            if (!dateVal) { showError('Please select a date.'); return; }

            const [year, month, day] = dateVal.split('-').map(Number);

            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const res = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ station, year, month, day, hour })
                });
                const data = await res.json();

                if (data.success) {
                    const h = data.hour;
                    const p = h < 12 ? 'AM' : 'PM';
                    const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;

                    document.getElementById('resultStation').textContent =
                        `${data.station}  ·  ${String(h).padStart(2, '0')}:00 (${h12} ${p})`;
                    document.getElementById('resultValue').textContent = data.prediction;
                    document.getElementById('resultUnit').textContent =
                        data.prediction === 1 ? 'estimated call this hour' : 'estimated calls this hour';

                    resultCard.classList.add('visible');

                    document.getElementById('recommendationText').textContent =
                        `The predicted ambulance demand for ${data.station} at ${String(h).padStart(2, '0')}:00 is ${data.prediction}. If ${data.station} does not have sufficient ambulances available, consider arranging ${data.prediction} ambulance${data.prediction > 1 ? 's' : ''} from the nearest fire station to support emergency response operations.`;
                } else {
                    showError('Prediction failed: ' + data.error);
                }
            } catch (e) {
                showError('Network error: ' + e.message);
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        function showError(msg) {
            const errEl = document.getElementById('errorMsg');
            errEl.textContent = '⚠ ' + msg;
            errEl.style.display = 'block';
        }
    </script>
</body>

</html>
